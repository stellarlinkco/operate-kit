[importlinter]
root_package = operatekit

[importlinter:contract:core-has-no-platform-deps]
name = operatekit.core has no platform dependencies
type = forbidden
source_modules = operatekit.core
forbidden_modules = adbutils, uiautomator2, pywinauto, mitmproxy, playwright

[importlinter:contract:runtime-has-no-platform-deps]
name = operatekit.runtime has no platform dependencies
type = forbidden
source_modules = operatekit.runtime
forbidden_modules = adbutils, uiautomator2, pywinauto, mitmproxy, playwright

[importlinter:contract:plugins-do-not-import-solutions]
name = plugins do not import business solutions
type = forbidden
source_modules = operatekit.plugins
forbidden_modules = solutions, mobile_agent.apps
